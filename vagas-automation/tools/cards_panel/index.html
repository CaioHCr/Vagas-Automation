<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: transparent; font-family: 'Inter', sans-serif; color: #eee; margin: 0; padding: 0; }
        #cards-root { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .vaga-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px; border-radius: 4px; transition: all 0.2s;
        }
        .vaga-card:hover { border-color: #ffaa00; background: rgba(255, 255, 255, 0.06); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .cargo { font-weight: 700; font-size: 0.95rem; color: #fff; margin: 0; }
        .empresa { font-size: 0.85rem; color: #888; margin: 5px 0; }
        .score-tag { 
            font-family: 'JetBrains Mono', monospace; color: #00ff66; font-weight: bold; 
            font-size: 0.75rem; background: rgba(0, 255, 102, 0.1); padding: 3px 8px; border-radius: 2px;
        }
        .card-footer { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .status-select { 
            width: 100%; background: rgba(0, 0, 0, 0.3); color: #d1d1d1; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
            cursor: pointer; outline: none;
        }
        .status-select:hover { border-color: #ffaa00; }
        .status-select:focus { border-color: #00ff66; }
        .link-btn {
            display: inline-block; margin-top: 10px; color: #ffaa00; text-decoration: none;
            font-size: 0.8rem; font-family: 'JetBrains Mono', monospace;
        }
        .link-btn:hover { text-decoration: underline; }
        .empty-state { text-align: center; padding: 60px; color: #444; font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <div id="cards-root">
        <div class="empty-state">[ CARREGANDO_VAGAS... ]</div>
    </div>

    <script>
        const Streamlit = window.parent !== window ? {
            setComponentValue: function(value) {
                window.parent.postMessage({type: "streamlit:setComponentValue", value: value}, "*");
            },
            setFrameHeight: function(height) {
                window.parent.postMessage({type: "streamlit:setFrameHeight", height: height}, "*");
            },
            setComponentReady: function() {
                window.parent.postMessage({type: "streamlit:componentReady", apiVersion: 1}, "*");
            }
        } : { setComponentReady: function(){}, setFrameHeight: function(){} };

        function render(args) {
            if (!args || !args.vagas) return;
            const root = document.getElementById('cards-root');
            root.innerHTML = '';

            if (args.vagas.length === 0) {
                root.innerHTML = '<div class="empty-state">[ NENHUMA_VAGA_CADASTRADA ]</div>';
                Streamlit.setFrameHeight(200);
                return;
            }

            args.vagas.forEach(v => {
                const card = document.createElement('div');
                card.className = 'vaga-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <p class="cargo">${v.cargo}</p>
                            <p class="empresa">${v.empresa}</p>
                        </div>
                        <span class="score-tag">${v.score}% MATCH</span>
                    </div>
                    <div class="card-footer">
                        <select class="status-select" data-id="${v.id}">
                            <option value="Novas" ${v.status === 'Novas' ? 'selected' : ''}>📋 Novas</option>
                            <option value="Vou Aplicar" ${v.status === 'Vou Aplicar' ? 'selected' : ''}>⭐ Vou Aplicar</option>
                            <option value="Aplicado" ${v.status === 'Aplicado' ? 'selected' : ''}>📤 Aplicado</option>
                            <option value="Excluir" ${v.status === 'Excluir' ? 'selected' : ''}>🗑️ Excluir</option>
                        </select>
                        ${v.link ? `<a class="link-btn" href="${v.link}" target="_blank">VER VAGA →</a>` : ''}
                    </div>
                `;
                root.appendChild(card);
            });

            root.querySelectorAll('.status-select').forEach(sel => {
                sel.addEventListener('change', (e) => {
                    Streamlit.setComponentValue({
                        id: parseInt(e.target.dataset.id),
                        status: e.target.value
                    });
                });
            });

            Streamlit.setFrameHeight(root.scrollHeight + 40);
        }

        window.addEventListener("message", (event) => {
            if (event.data.type === "streamlit:render") {
                render(event.data.args);
            }
        });

        Streamlit.setComponentReady();
    </script>
</body>
</html>
